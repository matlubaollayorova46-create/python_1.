<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math Master Academy</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    box-shadow:0 0 10px cyan;
}

header h1{
    color:cyan;
}

.container{
    width:95%;
    margin:auto;
    padding:20px;
}

.level{
    background:#1e293b;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,255,255,0.3);
}

.level h2{
    color:cyan;
}

iframe{
    width:100%;
    height:250px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

.question{
    background:#334155;
    padding:10px;
    border-radius:10px;
    margin-top:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:cyan;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:white;
}

.result{
    margin-top:10px;
    font-weight:bold;
}

.progress-box{
    width:100%;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.progress{
    height:25px;
    width:0%;
    background:linear-gradient(to right,cyan,blue);
    text-align:center;
    line-height:25px;
    font-weight:bold;
}

</style>
</head>

<body>

<header>
    <h1>📘 Math Master Academy</h1>
    <p>0 dan matematikani o‘rganing 🚀</p>
</header>

<div class="container">

<h2>📈 Progress</h2>

<div class="progress-box">
    <div class="progress" id="progress">0%</div>
</div>

<div id="app"></div>

</div>

<script>

const lessons = [

{
title:"1. Sonlar",
video:"https://www.youtube.com/embed/3JZ_D3ELwOQ",
question:"5 + 3 = ?",
answer:"8"
},

{
title:"2. Qo‘shish",
video:"https://www.youtube.com/embed/8mcTsyV56Zw",
question:"10 + 7 = ?",
answer:"17"
},

{
title:"3. Ayirish",
video:"https://www.youtube.com/embed/d1C8yljJ0xU",
question:"20 - 5 = ?",
answer:"15"
},

{
title:"4. Ko‘paytirish",
video:"https://www.youtube.com/embed/rdQz6ei-3fM",
question:"6 × 4 = ?",
answer:"24"
},

{
title:"5. Bo‘lish",
video:"https://www.youtube.com/embed/T4L3knz7bnI",
question:"24 ÷ 6 = ?",
answer:"4"
},

{
title:"6. Kasrlar",
video:"https://www.youtube.com/embed/3gh6Koh2Y1s",
question:"1/2 + 1/2 = ?",
answer:"1"
},

{
title:"7. Algebra",
video:"https://www.youtube.com/embed/NybHckSEQBI",
question:"x + 5 = 10",
answer:"5"
},

{
title:"8. Darajalar",
video:"https://www.youtube.com/embed/lh6QxY4Qx4U",
question:"2² = ?",
answer:"4"
}

];

const app = document.getElementById("app");

let done = 0;

lessons.forEach((lesson,index)=>{

app.innerHTML += `

<div class="level">

<h2>${lesson.title}</h2>

<iframe
src="${lesson.video}"
allowfullscreen>
</iframe>

<div class="question">
📌 ${lesson.question}
</div>

<input
type="text"
id="input${index}"
placeholder="Javobni kiriting">

<button onclick="check(${index})">
Tekshirish
</button>

<div class="result" id="result${index}"></div>

</div>

`;

});

function check(index){

const user =
document.getElementById("input"+index).value;

const result =
document.getElementById("result"+index);

if(user == lessons[index].answer){

result.innerHTML = "✅ To‘g‘ri!";
result.style.color = "lightgreen";

done++;

let percent =
Math.floor((done / lessons.length) * 100);

document.getElementById("progress").style.width =
percent + "%";

document.getElementById("progress").innerHTML =
percent + "%";

}else{

result.innerHTML = "❌ Noto‘g‘ri!";
result.style.color = "red";

}

}

</script>

</body>
</html>
