<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Master Academy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    min-height:100vh;
}

header{
    text-align:center;
    padding:30px;
    background:#111827;
    box-shadow:0 0 20px cyan;
}

header h1{
    font-size:45px;
    color:cyan;
}

header p{
    margin-top:10px;
    color:#cbd5e1;
}

.container{
    width:95%;
    margin:auto;
    padding:20px;
}

.progress-box{
    width:100%;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.progress{
    height:25px;
    width:0%;
    background:linear-gradient(to right,cyan,blue);
    text-align:center;
    line-height:25px;
    font-weight:bold;
}

.levels{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,255,255,0.4);
    transition:0.4s;
}

.card:hover{
    transform:scale(1.03);
}

.card h2{
    color:cyan;
    margin-bottom:10px;
}

.video{
    width:100%;
    height:180px;
    background:#0f172a;
    border-radius:10px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:gray;
}

.example{
    background:#334155;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
}

input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-size:16px;
}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:cyan;
    color:black;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:white;
}

.result{
    margin-top:10px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}

</style>
</head>

<body>

<header>
    <h1>📘 Math Master Academy</h1>
    <p>0 dan Professional Matematikani O‘rganing</p>
</header>

<div class="container">

<h2>📈 Progress</h2>

<div class="progress-box">
    <div class="progress" id="progress">0%</div>
</div>

<div class="levels" id="levels"></div>

</div>

<footer>
    🚀 Kelajakdagi buyuk matematik uchun yaratildi
</footer>

<script>

const lessons = [
{title:"1. Sonlar", q:"5 + 3 = ?", a:"8"},
{title:"2. Qo‘shish", q:"10 + 7 = ?", a:"17"},
{title:"3. Ayirish", q:"20 - 5 = ?", a:"15"},
{title:"4. Ko‘paytirish", q:"6 × 4 = ?", a:"24"},
{title:"5. Bo‘lish", q:"24 ÷ 6 = ?", a:"4"},
{title:"6. Kasrlar", q:"1/2 + 1/2 = ?", a:"1"},
{title:"7. O‘nlik Kasr", q:"0.5 + 0.5 = ?", a:"1"},
{title:"8. Foiz", q:"50% of 100 = ?", a:"50"},
{title:"9. Algebra", q:"x+5=10 x=?", a:"5"},
{title:"10. Tenglama", q:"2x=8 x=?", a:"4"},
{title:"11. Daraja", q:"2² = ?", a:"4"},
{title:"12. Ildiz", q:"√49 = ?", a:"7"},
{title:"13. Geometriya", q:"Kvadrat 4 tomon yig‘indisi?", a:"16"},
{title:"14. Uchburchak", q:"180-90-45=?", a:"45"},
{title:"15. Trigonometriya", q:"sin(90)=?", a:"1"},
{title:"16. Logarifm", q:"log10(100)=?", a:"2"},
{title:"17. Funksiya", q:"f(x)=x+1, f(2)=?", a:"3"},
{title:"18. Matritsa", q:"1+1=?", a:"2"},
{title:"19. Statistik", q:"2,2,2,2 average=?", a:"2"},
{title:"20. Final Boss", q:"100÷10+5=?", a:"15"}
];

const levels = document.getElementById("levels");

let completed = 0;

lessons.forEach((lesson,index)=>{

levels.innerHTML += `
<div class="card">
<h2>${lesson.title}</h2>

<div class="video">
🎥 Bu yerga YouTube video qo‘yishingiz mumkin
</div>

<div class="example">
📌 Misol:<br>
${lesson.q}
</div>

<input type="text" id="answer${index}" placeholder="Javobni kiriting">

<button onclick="checkAnswer(${index},'${lesson.a}')">
Tekshirish
</button>

<div class="result" id="result${index}"></div>

</div>
`;

});

function checkAnswer(index,correct){

const answer = document.getElementById("answer"+index).value;
const result = document.getElementById("result"+index);

if(answer == correct){

result.innerHTML = "✅ To‘g‘ri!";
result.style.color = "lightgreen";

completed++;

let percent = Math.floor((completed / lessons.length)*100);

document.getElementById("progress").style.width = percent+"%";
document.getElementById("progress").innerHTML = percent+"%";

}else{

result.innerHTML = "❌ Noto‘g‘ri!";
result.style.color = "red";

}

}

</script>

</body>
</html>
